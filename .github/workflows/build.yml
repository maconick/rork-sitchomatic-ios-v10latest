name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Sitchomatic iOS
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # List available Xcode versions and select the latest
          ls /Applications/ | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "No Xcode found"
            exit 1
          fi
          echo "Using Xcode at: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SitchomaticIOSV15.xcodeproj \
            -scheme SitchomaticIOSV15

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          xcodebuild build \
            -project SitchomaticIOSV15.xcodeproj \
            -scheme SitchomaticIOSV15 \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee build.log | tail -50

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
